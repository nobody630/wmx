<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生日快乐</title>
    <style>
      :root {
        --bg0: #ffe4e1;
        --bg1: #fff0f5;
        --card: rgba(255, 255, 255, 0.4);
        --card2: rgba(255, 255, 255, 0.6);
        --text: #5a3d46;
        --muted: #8c6a78;
        --accent: #ff85a2;
        --accent2: #ffb3c6;
        --shadow: 0 18px 60px rgba(255, 182, 193, 0.45);
        --radius: 20px;
        --pink0: #ff85a2;
        --pink1: #ff9ebd;
        --pink2: #ffd1df;
        --ink: #5a3d46;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC",
          "Microsoft YaHei", "Noto Sans CJK SC", Arial, "Helvetica Neue", sans-serif;
        color: var(--text);
        background: radial-gradient(900px 640px at 18% 12%, rgba(255, 182, 193, 0.40), transparent 58%),
          radial-gradient(900px 640px at 80% 18%, rgba(255, 192, 203, 0.30), transparent 56%),
          radial-gradient(920px 720px at 50% 95%, rgba(255, 228, 225, 0.20), transparent 60%),
          linear-gradient(180deg, #ffe4e1, #fff0f5);
        background-image: 
          radial-gradient(900px 640px at 18% 12%, rgba(255, 182, 193, 0.40), transparent 58%),
          radial-gradient(900px 640px at 80% 18%, rgba(255, 192, 203, 0.30), transparent 56%),
          radial-gradient(920px 720px at 50% 95%, rgba(255, 228, 225, 0.20), transparent 60%),
          linear-gradient(180deg, #ffe4e1, #fff0f5);
        background-repeat: no-repeat;
        background-attachment: fixed;
        overflow-x: hidden;
      }

      /* 流星雨和背景装饰 */
      .bg-effects {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        overflow: hidden;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.5;
        animation: blink var(--d) infinite alternate;
      }

      @keyframes blink {
        from { opacity: 0.2; transform: scale(0.8); }
        to { opacity: 0.8; transform: scale(1.2); }
      }

      .shooting-star {
        position: absolute;
        top: -100px;
        width: 3px;
        height: 120px;
        background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.9));
        transform: rotate(35deg);
        opacity: 0;
        animation: shoot var(--d) linear infinite;
        filter: drop-shadow(0 0 8px white);
      }

      @keyframes shoot {
        0% { transform: translate(var(--x), -100px) rotate(35deg); opacity: 0; }
        5% { opacity: 1; }
        40% { opacity: 1; }
        100% { transform: translate(calc(var(--x) + 600px), 110vh) rotate(35deg); opacity: 0; }
      }

      .falling-heart-heavy {
        position: absolute;
        top: -50px;
        font-size: var(--s);
        color: #ff3d93;
        opacity: 0.6;
        user-select: none;
        pointer-events: none;
        animation: fallHeavy var(--d) linear infinite;
        filter: drop-shadow(0 0 5px rgba(255, 61, 147, 0.3));
        z-index: 2;
      }

      @keyframes fallHeavy {
        0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(110vh) rotate(360deg) translateX(100px); opacity: 0; }
      }

      .floating-decor {
        position: absolute;
        font-size: 28px;
        opacity: 0.3;
        animation: floatDecor var(--d) ease-in-out infinite alternate;
        user-select: none;
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
      }

      @keyframes floatDecor {
        from { transform: translate(0, 0) rotate(0deg); }
        to { transform: translate(10px, 20px) rotate(10deg); }
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 28px 16px 42px;
      }

      .app {
        width: min(980px, 100%);
        display: grid;
        gap: 18px;
      }

      .panel {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .stage {
        display: grid;
        grid-template-columns: 1fr;
        min-height: 520px;
      }

      .photo {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 1fr;
        place-items: center;
        gap: 24px;
        padding: 30px;
        background: radial-gradient(680px 520px at 30% 15%, rgba(255, 255, 255, 0.40), transparent 58%),
          radial-gradient(760px 560px at 70% 85%, rgba(255, 182, 193, 0.36), transparent 62%);
      }
      
      @media (max-width: 768px) {
        .photo {
          grid-template-columns: 1fr;
          padding: 16px;
          gap: 14px;
        }

        .stage {
          min-height: auto;
        }

        .captionBox {
          max-height: min(42vh, 360px);
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          padding: 18px;
        }

        .captionBox h2 {
          font-size: 20px;
        }

        .captionBox p {
          font-size: 15px;
        }
      }

      .photoCard {
        width: 100%;
        max-width: 460px;
        height: auto;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
      }

      .photoCard.loading::before {
        content: "";
        position: absolute;
        inset: 16px;
        border-radius: 8px;
        background: rgba(255, 240, 245, 0.55);
        z-index: 2;
        pointer-events: none;
      }

      .photoCard.loading::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 36px;
        height: 36px;
        margin: -18px 0 0 -18px;
        border: 3px solid rgba(255, 133, 162, 0.25);
        border-top-color: #ff3d93;
        border-radius: 50%;
        animation: photoSpin 0.7s linear infinite;
        z-index: 3;
        pointer-events: none;
      }

      @keyframes photoSpin {
        to { transform: rotate(360deg); }
      }

      .photoCard img {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        display: block;
        object-fit: cover;
        border-radius: 8px;
        filter: saturate(1.05) contrast(1.02);
        transition: opacity 0.25s ease;
      }

      .photoCard.loading img {
        opacity: 0.35;
      }

      .captionBox {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 182, 193, 0.5);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(255, 182, 193, 0.2);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 16px;
        height: 100%;
        min-height: 200px;
        width: 100%;
        max-width: 400px;
      }

      .captionBox h2 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.2px;
        color: #ff3d93;
        text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .captionBox p {
        margin: 0;
        color: #5a3d46;
        line-height: 1.6;
        font-size: 16px;
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(255, 182, 193, 0.5);
        box-shadow: 0 4px 12px rgba(255, 182, 193, 0.2);
        font-size: 12px;
        color: var(--text);
        margin-bottom: auto;
        align-self: flex-start;
      }

      .btn {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        font-weight: 720;
        letter-spacing: 0.2px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.95);
        background: linear-gradient(135deg, #ffb3c6, #ff85a2);
        box-shadow: 0 8px 24px rgba(255, 133, 162, 0.3);
        transition: transform 180ms ease, filter 180ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      .btn:active {
        transform: translateY(0px);
        filter: brightness(0.98);
      }

      .btn.secondary {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(255, 182, 193, 0.4);
        box-shadow: none;
        color: #5a3d46;
      }

      .btn[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .fadeIn {
        animation: fadeIn 420ms ease both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0px);
        }
      }

      .summary {
        display: none;
      }

      /* 惊喜爆发效果 */
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: var(--c);
        opacity: var(--o);
        top: -20px;
        z-index: 300;
        pointer-events: none;
        animation: confettiFall var(--d) linear both;
      }

      @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg) translateX(var(--x)); opacity: 0; }
      }

      .heart-burst {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 10px;
        height: 10px;
        background: radial-gradient(circle, #fff 0%, rgba(255, 61, 147, 0.8) 50%, transparent 100%);
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        z-index: 250;
        pointer-events: none;
        animation: burstAnimation 1.2s ease-out both;
      }

      @keyframes burstAnimation {
        0% { transform: translate(-50%, -50%) scale(0); opacity: 1; filter: blur(0px); }
        50% { opacity: 1; filter: blur(5px); }
        100% { transform: translate(-50%, -50%) scale(80); opacity: 0; filter: blur(20px); }
      }

      /* 蛋糕界面持续彩带 */
      .cake-confetti-container {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 5;
      }

      .cake-confetti {
        position: absolute;
        width: 12px;
        height: 12px;
        background-color: var(--c);
        top: -20px;
        animation: cakeConfettiFall var(--d) linear infinite;
        opacity: 0.8;
      }

      @keyframes cakeConfettiFall {
        0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
        10% { opacity: 0.9; }
        90% { opacity: 0.9; }
        100% { transform: translateY(110vh) rotate(720deg) translateX(var(--x)); opacity: 0; }
      }

      /* 漂浮气球样式 */
      .balloon {
        position: absolute;
        bottom: -150px;
        width: var(--w);
        height: calc(var(--w) * 1.2);
        background-color: var(--c);
        border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
        z-index: 4;
        opacity: 0.7;
        animation: balloonFloat var(--d) ease-in infinite;
        display: flex;
        justify-content: center;
      }

      .balloon::before {
        content: "";
        position: absolute;
        bottom: -10px;
        border-left: 5px solid transparent;
        border-right: 5px solid transparent;
        border-bottom: 10px solid var(--c);
        opacity: 0.8;
      }

      .balloon::after {
        content: "";
        position: absolute;
        bottom: -50px;
        width: 1px;
        height: 50px;
        background: rgba(255, 255, 255, 0.4);
      }

      @keyframes balloonFloat {
        0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.7; }
        50% { transform: translateY(-50vh) translateX(var(--x)) rotate(var(--r)); }
        100% { transform: translateY(-120vh) translateX(calc(var(--x) * 2)) rotate(calc(var(--r) * 2)); opacity: 0; }
      }

      .summary.active {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
        margin: 0;
        position: fixed;
        inset: 0;
        z-index: 100;
        border-radius: 0;
        background: radial-gradient(900px 640px at 18% 12%, rgba(255, 182, 193, 0.40), transparent 58%),
          radial-gradient(900px 640px at 80% 18%, rgba(255, 192, 203, 0.30), transparent 56%),
          radial-gradient(920px 720px at 50% 95%, rgba(255, 228, 225, 0.20), transparent 60%),
          linear-gradient(180deg, #ffe4e1, #fff0f5);
      }

      .summary-title {
        font-size: clamp(24px, 5vw, 42px);
        color: #ff3d93;
        text-align: center;
        margin: 40px 20px 20px;
        font-weight: 900;
        text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 61, 147, 0.2);
        letter-spacing: 2px;
        animation: fadeInDown 1s ease-out both;
        z-index: 110;
      }

      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .summaryTop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        padding: 16px;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 110;
      }

      .desk {
        position: relative;
        margin-top: auto;
        margin-bottom: 5vh;
        width: min(1100px, 95vw);
        height: 72vh;
        border-radius: 24px;
        background: 
          radial-gradient(ellipse 100% 40% at 50% 100%, rgba(139, 90, 43, 0.3), transparent 70%),
          linear-gradient(180deg, #f5e6d3 0%, #e8d4bc 50%, #d4b896 100%);
        border: 5px solid #8b5a2b;
        box-shadow: 
          0 25px 60px rgba(0, 0, 0, 0.2),
          inset 0 0 100px rgba(139, 90, 43, 0.1);
        overflow: hidden;
        z-index: 101;
      }

      .desk::before {
        content: "";
        position: absolute;
        inset: 0;
        background: 
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 120px,
            rgba(139, 90, 43, 0.03) 120px,
            rgba(139, 90, 43, 0.03) 122px
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 80px,
            rgba(139, 90, 43, 0.02) 80px,
            rgba(139, 90, 43, 0.02) 82px
          );
        pointer-events: none;
      }

      .desk::after {
        display: none;
      }

      .desk .bg-effects {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 150; /* 提升至照片 pile (z-index: 1) 之上 */
        overflow: hidden;
      }

      .pile {
        position: absolute;
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        perspective: 1200px;
        display: grid;
        place-items: center;
        z-index: 1;
      }

      .polaroid {
        position: absolute;
        width: min(140px, 25vw);
        aspect-ratio: 1 / 1;
        transform: translate(var(--x), var(--y)) rotate(var(--r));
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.95);
        padding: 8px 8px 24px 8px;
        box-shadow: 
          0 10px 30px rgba(0, 0, 0, 0.2),
          0 4px 10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border: 1px solid rgba(200, 180, 160, 0.4);
        z-index: 10; /* 单张照片基础层级 */
      }

      .polaroid::after {
        display: none;
      }

      .polaroid img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        border-radius: 4px;
      }

      .polaroid.in {
        animation: dropIn 500ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
      }

      @keyframes dropIn {
        from {
          opacity: 0;
          transform: translate(var(--x), calc(var(--y) + 60px)) rotate(calc(var(--r) - 20deg)) scale(0.8);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1);
          filter: blur(0px);
        }
      }

      .wall {
        display: none;
        width: 100%;
        height: 100%;
        overflow-y: auto;
        border-radius: 0;
        border: none;
        background: radial-gradient(900px 420px at 50% 0%, rgba(255, 255, 255, 0.5), transparent 60%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(255, 182, 193, 0.2));
        position: relative;
      }

      .hearts-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 200; /* 提升至照片墙 (wallGrid) 之上 */
      }

      .falling-heart {
        position: absolute;
        top: -10%;
        color: rgba(255, 182, 193, 0.6);
        font-size: 20px;
        animation: fall linear infinite;
      }

      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(360deg) scale(1.2);
          opacity: 0;
        }
      }

      .wall.active {
        display: block;
      }

      .wallGrid {
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
      }

      @media (max-width: 980px) {
        .wallGrid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      @media (max-width: 620px) {
        .wallGrid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 420px) {
        .wallGrid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .frame {
        position: relative;
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(255, 182, 193, 0.3);
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease, filter 0.4s ease;
        z-index: 10;
      }

      .frame:hover {
        transform: scale(1.08) translateY(-8px) rotate(1deg);
        filter: brightness(1.05);
        box-shadow: 0 25px 50px rgba(255, 61, 147, 0.4);
        z-index: 20;
      }

      .frameInner {
        border-radius: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      .frameInner img {
        width: 100%;
        height: 120px;
        display: block;
        object-fit: cover;
      }

      .viewer {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 500;
      }

      .viewer.active {
        display: grid;
        place-items: center;
      }

      .viewerBackdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .viewerCard {
        position: relative;
        width: min(920px, 92vw);
        max-height: min(86vh, 820px);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(10, 8, 14, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 26px 90px rgba(0, 0, 0, 0.50);
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
      }

      @media (max-width: 860px) {
        .viewerCard {
          grid-template-columns: 1fr;
          max-height: 90vh;
        }
      }

      .viewerCard img {
        width: 100%;
        height: 100%;
        max-height: 90vh;
        object-fit: cover;
        display: block;
      }

      .viewerText {
        padding: 16px 16px 18px;
        display: grid;
        gap: 10px;
        align-content: start;
        background: linear-gradient(180deg, rgba(255, 61, 147, 0.10), rgba(0, 0, 0, 0.18));
        border-left: 1px solid rgba(255, 255, 255, 0.10);
      }

      @media (max-width: 860px) {
        .viewerText {
          border-left: 0;
          border-top: 1px solid rgba(255, 255, 255, 0.10);
        }
      }

      .viewerText h2 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0.2px;
      }

      .viewerText p {
        margin: 0;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.7;
        font-size: 14px;
        white-space: pre-wrap;
      }

      .viewerClose {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 2;
        padding: 10px 12px;
        border-radius: 999px;
      }

      .cakeScene {
        display: none;
      }

      .cakeScene.active {
        display: grid;
        gap: 18px;
        padding: 22px 18px 24px;
        background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
                    linear-gradient(180deg, #ffe4e1, #fff0f5);
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
          linear-gradient(180deg, #ffe4e1, #fff0f5),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5.5l2.5 7.5h8l-6.5 4.5 2.5 7.5-6.5-5-6.5 5 2.5-7.5-6.5-4.5h8z' fill='rgba(255,182,193,0.3)' fill-rule='evenodd'/%3E%3C/svg%3E"),

        background-repeat: no-repeat, no-repeat, repeat, repeat;
        border-radius: 18px;
        position: relative;
      }
      
      .cakeScene::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 180px;
        background: radial-gradient(ellipse at 50% 100%, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
        pointer-events: none;
        border-radius: 0 0 18px 18px;
        z-index: 0;

      .sceneTop {

      .reveal {

      @keyframes reveal {

          filter: blur(2px);
        }
        35% {

          filter: blur(1px);
        }
        100% {
          opacity: 1;
          transform: translateY(0px) scale(1);
          filter: blur(0px);
        }
      }

      .cake {
        position: relative;

        height: 420px;
        display: grid;
        place-items: end center;
      }

      .age-sign {
        position: absolute;
        left: 50%;
        bottom: 400px;
        transform: translateX(-50%);
        font-size: 52px;
        font-weight: 900;
        color: #ff3d93;
        text-shadow: 
          2px 2px 0px rgba(255, 255, 255, 0.9),
          -2px -2px 0px rgba(255, 255, 255, 0.9),
          2px -2px 0px rgba(255, 255, 255, 0.9),
          -2px 2px 0px rgba(255, 255, 255, 0.9),
          0px 4px 12px rgba(255, 61, 147, 0.4);

        letter-spacing: -2px;
        z-index: 10;

      }

      .age-sign::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);

        height: 20px;
        background: #ddd;
        border-radius: 2px;
        z-index: -1;
      }

      @keyframes float {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50% { transform: translateX(-50%) translateY(-8px); }
      }

      .cake::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        width: 96%;
        height: 38px;
        border-radius: 999px;
        background: radial-gradient(closest-side, rgba(0, 0, 0, 0.45), transparent 72%);
        filter: blur(2px);
        opacity: 0.65;
      }

      .plate {
        width: 92%;
        height: 26px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.16));
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.45);
        margin-bottom: 10px;
      }

      .tier {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
        overflow: hidden;
      }

      .tier.bottom {
        bottom: 34px;
        width: 92%;
        height: 170px;
        border-radius: 26px 26px 34px 34px;
        background: linear-gradient(180deg, #ffb3c6, #ff85a2 55%, #ff4d79);

      .tier.mid {
        bottom: 170px;
        width: 72%;
        height: 130px;
        border-radius: 24px 24px 30px 30px;

      }

      .tier.top {
        bottom: 280px;

      .tier::before {

        inset: 0;
        background: radial-gradient(600px 220px at 40% 10%, rgba(255, 255, 255, 0.35), transparent 58%),
          radial-gradient(520px 220px at 70% 50%, rgba(255, 255, 255, 0.16), transparent 60%);

      .drip {
        position: absolute;
        left: 0;
        right: 0;
        top: -10px;

        border-radius: 18px 18px 22px 22px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.24));
        opacity: 0.9;
        filter: blur(0.2px);
      }

      .drip::before,
      .drip::after {
        content: "";
        position: absolute;
        top: 10px;
        width: 38px;
        height: 34px;
        border-radius: 0 0 22px 22px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.14));

      .drip::before {
        left: 16%;

      .drip::after {
        right: 22%;

        height: 40px;
      }

      .sprinkles {
        position: absolute;
        inset: 18px 16px;

        background-image: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.75) 0 2px, transparent 3px),
          radial-gradient(circle at 55% 40%, rgba(255, 255, 255, 0.65) 0 2px, transparent 3px),
          radial-gradient(circle at 70% 65%, rgba(255, 255, 255, 0.7) 0 2px, transparent 3px),
          radial-gradient(circle at 35% 70%, rgba(255, 255, 255, 0.6) 0 2px, transparent 3px),
          radial-gradient(circle at 18% 65%, rgba(255, 61, 147, 0.55) 0 2px, transparent 3px),

        mix-blend-mode: overlay;
        pointer-events: none;
      }

      .berries {
        position: absolute;
        left: 50%;
        bottom: 308px;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        opacity: 0.98;
      }

      .berry {
        width: 18px;
        height: 18px;
        border-radius: 8px 8px 12px 12px;
        background: linear-gradient(180deg, rgba(255, 92, 138, 0.95), rgba(178, 18, 72, 0.82));
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.22);
        position: relative;
      }

      .berry::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -7px;
        transform: translateX(-50%);
        width: 12px;
        height: 9px;
        border-radius: 10px;
        background: linear-gradient(180deg, rgba(66, 255, 190, 0.75), rgba(0, 0, 0, 0.0));

      }

      .candles {
        position: absolute;

      }

      .candle {
        width: 16px;
        height: 62px;
        border-radius: 10px;

      .candle:nth-child(2) {

      .candle .stripe {
        position: absolute;
        inset: 8px 3px 8px 3px;
        border-radius: 8px;
        background: repeating-linear-gradient(
          45deg,
          rgba(255, 90, 165, 0.58) 0 6px,
          rgba(255, 255, 255, 0.18) 6px 12px
        );
        opacity: 0.85;
      }

      .flame {
        position: absolute;
        left: 50%;
        top: -22px;
        transform: translateX(-50%);
        width: 18px;
        height: 26px;
        border-radius: 12px 12px 14px 14px;
        background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.95), rgba(255, 209, 102, 0.95) 35%, rgba(255, 90, 165, 0.65) 70%, rgba(255, 90, 165, 0.0) 72%);
        filter: drop-shadow(0 0 14px rgba(255, 209, 102, 0.55)) drop-shadow(0 0 22px rgba(255, 90, 165, 0.28));
        animation: flicker 190ms infinite alternate;
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .flame.extinguished {
        opacity: 0 !important;
        transform: translateX(-50%) scale(0) !important;
        pointer-events: none;
      }

      /* 烟雾效果 */
      .smoke {
        position: absolute;
        left: 50%;
        top: -30px;
        transform: translateX(-50%);
        width: 4px;
        height: 4px;

        pointer-events: none;

      }

      @keyframes smokeRise {
        0% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.8; filter: blur(0px); }
        100% { transform: translateX(calc(-50% + 20px)) translateY(-80px) scale(6); opacity: 0; filter: blur(10px); }
      }

      /* 惊喜祝福语 */
      .final-wish {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        text-align: center;
        font-size: clamp(20px, 4vw, 32px);
        font-weight: 900;
        color: #ff3d93;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 2px 2px 0 white;
        opacity: 0;
        pointer-events: none;
        transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 100;
      }

      .final-wish.active {
        opacity: 1;
        top: 25%;
        transform: translate(-50%, -50%) scale(1.1);
      }

      .flame::after {
        content: "";
        position: absolute;
        inset: 3px 5px 8px;
        border-radius: 999px;
        background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.95), rgba(255, 209, 102, 0.25) 60%, transparent 70%);
        opacity: 0.9;
        transform: rotate(-6deg);
      }

      @keyframes flicker {
        from {
          transform: translateX(-50%) rotate(-2deg) scale(0.98);
          opacity: 0.92;
        }
        to {
          transform: translateX(-50%) rotate(2deg) scale(1.03);
          opacity: 1;
        }
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 10px 12px;
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        opacity: 0;
        pointer-events: none;
        transition: opacity 240ms ease, transform 240ms ease;
        z-index: 20;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-2px);
      }

      /* 全局加载动画 */
      .loader-mask {
        position: fixed;
        inset: 0;
        background: var(--bg1);
        display: none;
        place-items: center;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .loader-mask.active {
        display: grid;
        opacity: 1;
      }

      .loader-content {
        text-align: center;
      }

      .heart-loader {
        font-size: 50px;
        color: #ff3d93;
        animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        display: inline-block;
        filter: drop-shadow(0 0 10px rgba(255, 61, 147, 0.4));
      }

      @keyframes heartBeat {
        0% { transform: scale(0.95); }
        5% { transform: scale(1.1); }
        39% { transform: scale(0.85); }
        45% { transform: scale(1); }
        60% { transform: scale(0.95); }
        100% { transform: scale(0.9); }
      }

      .loader-text {
        margin-top: 15px;
        font-size: 16px;
        color: var(--text);
        font-weight: bold;
        letter-spacing: 1px;
      }

      .sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* 密码锁样式 */
      .lock-panel {
        display: none;
        place-items: center;
        min-height: 520px;
        background: radial-gradient(680px 520px at 30% 15%, rgba(255, 255, 255, 0.40), transparent 58%),
          radial-gradient(760px 560px at 70% 85%, rgba(255, 182, 193, 0.36), transparent 62%);
      }

      .lock-panel.active {
        display: grid;
      }

      .lock-container {
        background: rgba(255, 255, 255, 0.85);
        padding: 40px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.8);
        text-align: center;
        width: min(400px, 90vw);
      }

      .lock-title {
        color: #ff3d93;
        font-size: 24px;
        margin-bottom: 24px;
        font-weight: bold;
      }

      .pass-inputs {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 30px;
      }

      .pass-input {
        width: 50px;
        height: 60px;
        font-size: 24px;
        text-align: center;
        border: 2px solid var(--pink2);
        border-radius: 12px;
        background: white;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s, transform 0.2s;
      }

      .pass-input:focus {
        border-color: var(--pink0);
        transform: scale(1.05);
      }

      /* 密码反馈动画 */
      .pass-input.correct {
        border-color: #4caf50 !important;
        background-color: rgba(76, 175, 80, 0.1);
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        animation: pulseGreen 0.5s ease-in-out;
      }

      .pass-input.wrong {
        border-color: #f44336 !important;
        background-color: rgba(244, 67, 54, 0.1);
        box-shadow: 0 0 15px rgba(244, 67, 54, 0.4);
        animation: shake 0.4s ease-in-out;
      }

      @keyframes pulseGreen {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }

      /* 音乐控制 */
      .music-ctrl {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        padding: 8px 12px;
        border-radius: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        opacity: 0.6;
      }

      .music-ctrl:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.9);
      }

      .music-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: #ff3d93;
        color: white;
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform 0.2s;
        font-size: 16px;
        flex-shrink: 0;
      }

      .music-btn:active {
        transform: scale(0.9);
      }

      .music-btn.paused {
        background: #999;
      }

      .volume-slider {
        width: 0;
        overflow: hidden;
        transition: width 0.3s ease;
        display: flex;
        align-items: center;
      }

      .music-ctrl:hover .volume-slider {
        width: 70px;
        margin-left: 5px;
      }

      .volume-slider input {
        width: 100%;
        cursor: pointer;
        accent-color: #ff3d93;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        50% { transform: translateX(8px); }
        75% { transform: translateX(-4px); }
      }

      .lock-hint {
        color: var(--muted);
        font-size: 14px;
        margin-top: 10px;
      }

      /* 开场信 */
      .letter-panel {
        display: none;
        place-items: center;
        min-height: 520px;
        background: radial-gradient(680px 520px at 30% 15%, rgba(255, 255, 255, 0.4), transparent 58%),
          radial-gradient(760px 560px at 70% 85%, rgba(255, 182, 193, 0.36), transparent 62%);
      }

      .letter-panel.active {
        display: grid;
      }

      .letter-card {
        width: min(560px, 92vw);
        background: rgba(255, 252, 248, 0.95);
        border: 1px solid rgba(255, 182, 193, 0.6);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px 28px 28px;
        position: relative;
      }

      .letter-card::before {
        content: "💌";
        position: absolute;
        top: -18px;
        right: 24px;
        font-size: 36px;
        filter: drop-shadow(0 4px 8px rgba(255, 61, 147, 0.25));
      }

      .letter-card h2 {
        margin: 0 0 16px;
        color: #ff3d93;
        font-size: 22px;
      }

      .letter-body {
        min-height: 160px;
        margin: 0 0 24px;
        line-height: 1.85;
        color: var(--text);
        font-size: 16px;
        white-space: pre-wrap;
      }

      .letter-body::after {
        content: "▍";
        animation: letterCaret 0.8s step-end infinite;
        color: #ff85a2;
      }

      .letter-body.done::after {
        display: none;
      }

      @keyframes letterCaret {
        50% { opacity: 0; }
      }

      .letter-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      /* 许愿纸条 */
      .wish-overlay {
        position: fixed;
        inset: 0;
        z-index: 3500;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(90, 61, 70, 0.45);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      .wish-overlay.active {
        display: grid;
      }

      .wish-card {
        width: min(440px, 100%);
        max-height: min(90vh, 520px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background: rgba(255, 255, 255, 0.96);
        border-radius: var(--radius);
        border: 1px solid rgba(255, 182, 193, 0.7);
        box-shadow: var(--shadow);
        padding: 28px 24px 24px;
        text-align: center;
      }

      .wish-card h3 {
        margin: 0 0 8px;
        color: #ff3d93;
        font-size: 20px;
      }

      .wish-hint {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .wish-card textarea {
        width: 100%;
        min-height: 100px;
        max-height: min(36vh, 200px);
        resize: vertical;
        border: 2px solid var(--pink2);
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        font-size: 15px;
        line-height: 1.6;
        color: var(--text);
        outline: none;
        box-sizing: border-box;
      }

      .wish-card textarea:focus {
        border-color: var(--pink0);
      }

      .wish-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .wish-memory {
        margin: 16px auto 0;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px dashed rgba(255, 61, 147, 0.45);
        border-radius: 14px;
        text-align: left;
        position: relative;
        z-index: 2;
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .wish-memory-title {
        font-size: 13px;
        color: #ff3d93;
        font-weight: bold;
        margin-bottom: 6px;
      }

      .wish-memory-text {
        margin: 0;
        color: var(--text);
        line-height: 1.7;
        font-size: 15px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .wish-memory.hidden {
        display: none;
      }

      .cake-final-words {
        margin: 12px 0 0;
        color: #ff3d93;
        line-height: 1.7;
        font-size: 18px;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        overflow-wrap: break-word;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="loader-mask" id="loaderMask">
      <div class="loader-content">

      </div>
    </div>
    <div class="music-ctrl" id="musicCtrl" style="display: none;">
      <button class="music-btn" id="musicToggleBtn" title="播放/暂停">
        <span id="musicIcon">🎵</span>

      /** 切歌淡入淡出总时长（毫秒） */
      const MUSIC_CROSSFADE_MS = 1600;
      let musicFadeId = 0;

      function getMusicVolume() {
        return parseFloat(els.volumeSlider.value);
      }

      function isPlayingSrc(audio, src) {
        if (!audio.src) return false;
        try {
          return new URL(src, location.href).href === audio.src;
        } catch {
          return audio.src.includes(src);
        }
      }

      function fadeVolume(audio, fromVol, toVol, durationMs, fadeId) {
        if (durationMs <= 0) {
          audio.volume = Math.max(0, Math.min(1, toVol));
          return Promise.resolve(fadeId === musicFadeId);
        }
        const start = performance.now();
        return new Promise((resolve) => {
          function tick(now) {
            if (fadeId !== musicFadeId) {
              resolve(false);
              return;
            }
            const t = Math.min(1, (now - start) / durationMs);
            audio.volume = Math.max(0, Math.min(1, fromVol + (toVol - fromVol) * t));
            if (t < 1) {
              requestAnimationFrame(tick);
            } else {
              audio.volume = Math.max(0, Math.min(1, toVol));
              resolve(true);
            }
          }
          requestAnimationFrame(tick);
        });
      }

      async function crossfadeTo(src) {
        const fadeId = ++musicFadeId;
        const audio = els.bgm;
        const targetVol = getMusicVolume();
        const half = MUSIC_CROSSFADE_MS / 2;
        const wasPlaying = !audio.paused && !!audio.src;

        if (isPlayingSrc(audio, src) && wasPlaying) {
          if (audio.volume < targetVol * 0.95) {
            await fadeVolume(audio, audio.volume, targetVol, half, fadeId);
          }
          return fadeId === musicFadeId;
        }

        if (wasPlaying) {
          const ok = await fadeVolume(audio, audio.volume, 0, half, fadeId);
          if (!ok) return false;
          audio.pause();
        }

        audio.src = src;
        audio.loop = true;
        audio.currentTime = 0;
        audio.volume = 0;

        try {
          await audio.play();
          els.musicCtrl.style.display = "flex";
          els.musicIcon.textContent = "🎵";
          els.musicToggleBtn.classList.remove("paused");
        } catch (e) {
          console.log("Music play failed:", e);
          return false;
        }

        const fadeInMs = wasPlaying ? half : MUSIC_CROSSFADE_MS;
        await fadeVolume(audio, 0, targetVol, fadeInMs, fadeId);
        return fadeId === musicFadeId;
      }

      async function fadeInMusic(src) {
        const fadeId = ++musicFadeId;
        const audio = els.bgm;
        const targetVol = getMusicVolume();

        if (isPlayingSrc(audio, src) && !audio.paused) {
          await fadeVolume(audio, audio.volume, targetVol, MUSIC_CROSSFADE_MS / 2, fadeId);
          return fadeId === musicFadeId;
        }

        audio.src = src;
        audio.loop = true;
        audio.currentTime = 0;
        audio.volume = 0;

        try {

        await fadeVolume(audio, 0, targetVol, MUSIC_CROSSFADE_MS, fadeId);
        return fadeId === musicFadeId;
      }

      async function unlockAndContinue() {
        await showLoader("正在开启美好回忆...", 1200);
        await showOpeningLetterFlow();
      }

      function showLoader(text, duration = 1000) {
        els.loaderText.textContent = text || "正在加载中...";
        els.loaderMask.classList.add("active");
        return new Promise(resolve => {
          setTimeout(() => {
            els.loaderMask.classList.remove("active");
            resolve();
          }, duration);
        });
      }

      function initLock() {
        els.passInputs.forEach((input, idx) => {
          input.addEventListener("input", (e) => {
            if (e.target.value.length === 1 && idx < els.passInputs.length - 1) {
              els.passInputs[idx + 1].focus();
            }
            checkPassword();
          });

          input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !e.target.value && idx > 0) {
              els.passInputs[idx - 1].focus();
            }
          });
        });
      }

      function checkPassword() {
        const pass = Array.from(els.passInputs).map(i => i.value).join("");
        if (pass.length === 4) {
          if (pass === CONFIG.password) {
            // 正确反馈
            els.passInputs.forEach(i => {
              i.classList.add("correct");
              i.disabled = true; // 防止重复输入
            });
            showToast("密码正确！有一封信在等你…");
            setTimeout(() => unlockAndContinue(), 800);
          } else {
            // 错误反馈
            els.passInputs.forEach(i => i.classList.add("wrong"));
            showToast("密码错误，再试试看？");
            
            // 动画结束后清理
            setTimeout(() => {
              els.passInputs.forEach(i => {
                i.classList.remove("wrong");
                i.value = "";
              });
              els.passInputs[0].focus();
            }, 500);
          }
        }
      }

      async function startMusic() {
        await fadeInMusic(CONFIG.musicSrc);
      }

      function initMusicControl() {
        els.musicToggleBtn.addEventListener("click", () => {
          musicFadeId++;
          if (els.bgm.paused) {
            els.bgm.volume = getMusicVolume();
            els.bgm.play();
            els.musicIcon.textContent = "🎵";
            els.musicToggleBtn.classList.remove("paused");
          } else {
            els.bgm.pause();
            els.musicIcon.textContent = "🔇";
            els.musicToggleBtn.classList.add("paused");
          }
        });

        els.volumeSlider.addEventListener("input", (e) => {
          musicFadeId++;
          els.bgm.volume = parseFloat(e.target.value);
        });

        // 监听音频播放状态变化
        els.bgm.addEventListener("play", () => {
          els.musicIcon.textContent = "🎵";
          els.musicToggleBtn.classList.remove("paused");
        });
        els.bgm.addEventListener("pause", () => {
          els.musicIcon.textContent = "🔇";
          els.musicToggleBtn.classList.add("paused");
        });
      }

      function updateHeader() {
        const total = slides.length || 1;
        const current = Math.min(state.index + 1, total);
        els.badgeText.textContent = `${current} / ${total}`;
      }

      function animateCardOnce() {
        els.photoCard.classList.remove("fadeIn");
        void els.photoCard.offsetWidth;
        els.photoCard.classList.add("fadeIn");
      }

      function prefetchSlideImage(index) {
        if (index < 0 || index >= slides.length) return;
        const src = slides[index].img;
        if (preloadedImages.has(src)) return;
        const img = new Image();
        img.onload = () => preloadedImages.add(src);
        img.onerror = () => preloadedImages.add(src);
        img.src = src;
      }

      function loadSlideImage(src, renderId) {
        return new Promise((resolve) => {
          let settled = false;
          const finish = (ok) => {
            if (settled) return;
            settled = true;
            resolve(ok);
          };

          const img = new Image();

          const apply = async () => {
            if (settled) return;
            if (renderId !== slideRenderId) {
              finish(false);
              return;
            }
            if (!img.naturalWidth) {
              finish(false);
              return;
            }
            els.mainImg.src = src;
            els.mainImg.alt = slides[state.index]?.title || "照片";
            try {
              if (els.mainImg.decode) await els.mainImg.decode();
            } catch {}
            if (renderId !== slideRenderId) {
              finish(false);
              return;
            }
            preloadedImages.add(src);
            finish(true);
          };

          img.onload = () => apply();
          img.onerror = () => {
            if (renderId !== slideRenderId) {
              finish(false);
              return;
            }
            els.mainImg.removeAttribute("src");
            showToast("这张照片加载失败，请检查网络或文件路径");
            finish(false);
          };

          img.src = src;
          if (img.complete) apply();
        });
      }

      function setSlideLoading(loading) {
        state.slideLoading = loading;
        els.photoCard.classList.toggle("loading", loading);
        els.nextBtn.disabled = loading;
      }

      async function renderSlide() {
        if (slides.length === 0) {
          els.captionTitle.textContent = "还没有照片";
          els.captionText.textContent = "请先在 CONFIG 里配置 photoFileNames 和 slides。";
          els.mainImg.removeAttribute("src");
          els.nextBtn.disabled = true;
          updateHeader();
          return;
        }

        const renderId = ++slideRenderId;
        state.index = Math.max(0, Math.min(state.index, slides.length - 1));
        const s = slides[state.index];

        els.captionTitle.textContent = s.title || "这一刻";
        els.captionText.textContent = s.text || "";
        updateHeader();

        const isLast = state.index === slides.length - 1;
        els.nextBtn.textContent = isLast ? "完成" : "下一页";

        setSlideLoading(true);

        try {
          const ok = await loadSlideImage(s.img, renderId);
          if (renderId !== slideRenderId) return;
          if (ok) {
            animateCardOnce();
            prefetchSlideImage(state.index + 1);
          }
        } finally {
          if (renderId === slideRenderId) {
            setSlideLoading(false);
          }
        }
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      /** 动画结束后移除节点，并用 fallback 防止 animationend 未触发 */
      function removeOnAnimationEnd(el, fallbackMs) {
        const remove = () => {
          if (el.parentNode) el.remove();
        };
        el.addEventListener("animationend", remove, { once: true });
        if (fallbackMs > 0) {
          setTimeout(remove, fallbackMs);
        }
      }

      function clearDeskTransientEffects() {
        els.desk.querySelectorAll(".confetti, .heart-burst").forEach((el) => el.remove());
      }

      function destroySummaryEffects() {
        clearDeskTransientEffects();
        if (els.deskBgEffects) els.deskBgEffects.innerHTML = "";
        if (els.heartsContainer) els.heartsContainer.innerHTML = "";
      }

      function stopCakeConfettiInterval() {
        if (effectTimers.cakeConfetti) {
          clearInterval(effectTimers.cakeConfetti);
          effectTimers.cakeConfetti = null;
        }
      }

      function stopCakeBalloonInterval() {
        if (effectTimers.cakeBalloons) {
          clearInterval(effectTimers.cakeBalloons);
          effectTimers.cakeBalloons = null;
        }
      }

      function clearCakePartyEffects() {
        stopCakeConfettiInterval();
        stopCakeBalloonInterval();
        if (els.cakeConfettiContainer) els.cakeConfettiContainer.innerHTML = "";
      }

      function clearSummary() {
        els.pile.innerHTML = "";
        els.wallGrid.innerHTML = "";
        els.wall.classList.remove("active");
        destroySummaryEffects();
      }

      function buildWall() {
        els.wallGrid.innerHTML = "";
        for (let i = 0; i < slides.length; i++) {
          const s = slides[i];
          const frame = document.createElement("div");
          frame.className = "frame fadeIn";
          frame.setAttribute("role", "button");
          frame.setAttribute("tabindex", "0");
          frame.dataset.index = String(i);

          const inner = document.createElement("div");
          inner.className = "frameInner";

          const img = document.createElement("img");
          img.src = s.img;
          img.alt = s.title || "照片";

          inner.appendChild(img);
          frame.appendChild(inner);
          frame.addEventListener("click", () => openViewer(i));
          frame.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") openViewer(i);
          });

          els.wallGrid.appendChild(frame);
        }
        createFallingHearts();
      }

      function createFallingHearts() {
        els.heartsContainer.innerHTML = "";
        const heartIcons = ["❤️", "💖", "💗", "💓", "💕"];
        for (let i = 0; i < 30; i++) {
          const heart = document.createElement('div');
          heart.className = 'falling-heart';
          heart.textContent = heartIcons[Math.floor(Math.random() * heartIcons.length)];
          heart.style.left = `${Math.random() * 100}%`;
          heart.style.animationDuration = `${randomBetween(3, 7)}s`;
          heart.style.animationDelay = `${randomBetween(0, 5)}s`;
          heart.style.fontSize = `${randomBetween(12, 28)}px`;
          els.heartsContainer.appendChild(heart);
        }
      }

      async function runDeskStackOnce() {
        if (state.summaryStacked) {
          els.desk.style.display = "none";
          els.wall.classList.add("active");
          return;
        }
        clearSummary();
        
        await showLoader("正在为您摆放爱心照片...", 1500);
        
        els.desk.style.display = "block";
        
        // Initialize background effects for the desk
        initBackgroundEffects(els.deskBgEffects);
        
        // Generate heart shape coordinates for 23 photos - constrained to fit in the pile area
        const heartCoords = [];
        const n = 23;
        const scaleBase = 15; // Adjusted scale to fit within the smaller desk area
        
        for (let i = 0; i < n; i++) {
          const t = (i / n) * 2 * Math.PI;
          let x = 16 * Math.pow(Math.sin(t), 3);
          let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
          
          heartCoords.push({
            x: x * scaleBase, 
            y: -y * scaleBase 
          });
        }
        
        for (let i = 0; i < slides.length; i++) {
          const s = slides[i];
          const polaroid = document.createElement("div");
          polaroid.className = "polaroid in";
          
          let x, y;
          if (i < heartCoords.length) {
            x = heartCoords[i].x;
            y = heartCoords[i].y;
          } else {
            x = randomBetween(-80, 80);
            y = randomBetween(-60, 40);
          }
          
          polaroid.style.setProperty("--r", `${randomBetween(-8, 8)}deg`);
          polaroid.style.setProperty("--x", `${x}px`);
          polaroid.style.setProperty("--y", `${y}px`);
          polaroid.style.zIndex = String(10 + i);

          const img = document.createElement("img");
          img.src = s.img;
          img.alt = s.title || "照片";
          polaroid.appendChild(img);
          els.pile.appendChild(polaroid);

          await new Promise((r) => setTimeout(r, 500));
        }
        
        // Move button to the right side, not overlapping with photos
        const goToWallBtn = document.createElement("button");
        goToWallBtn.className = "btn fadeIn";
        goToWallBtn.textContent = "查看照片墙";
        goToWallBtn.style.position = "absolute";
        goToWallBtn.style.bottom = "30px";
        goToWallBtn.style.right = "30px";
        goToWallBtn.style.zIndex = "200";
        goToWallBtn.style.padding = "16px 28px";
        goToWallBtn.style.fontSize = "18px";
        goToWallBtn.style.boxShadow = "0 8px 30px rgba(255, 61, 147, 0.5)";
        
        goToWallBtn.addEventListener("click", async () => {
          state.summaryStacked = true;
          els.desk.style.display = "none";
          destroySummaryEffects();
          buildWall();
          await new Promise((r) => setTimeout(r, 100));
          els.wall.classList.add("active");
        });
        
        await new Promise((r) => setTimeout(r, 600));
        
        // 惊喜爆发逻辑
        createSurpriseBurst();
        
        els.desk.appendChild(goToWallBtn);
      }

      function createSurpriseBurst() {
        clearDeskTransientEffects();

        // 1. 中心闪光爆发
        const burst = document.createElement("div");
        burst.className = "heart-burst";
        els.desk.appendChild(burst);
        removeOnAnimationEnd(burst, 1500);

        // 2. 彩带/纸屑雨
        const colors = ["#ff85a2", "#ffb3c6", "#ffd1df", "#ff3d93", "#ffffff", "#fff0f5"];
        for (let i = 0; i < 100; i++) {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.setProperty("--c", colors[Math.floor(Math.random() * colors.length)]);
          confetti.style.setProperty("--x", `${randomBetween(-200, 200)}px`);
          const durationSec = randomBetween(2, 5);
          const delaySec = Math.random() * 0.5;
          confetti.style.setProperty("--d", `${durationSec}s`);
          confetti.style.setProperty("--o", `${randomBetween(0.5, 1)}`);
          confetti.style.left = `${Math.random() * 100}%`;
          confetti.style.animationDelay = `${delaySec}s`;
          els.desk.appendChild(confetti);
          removeOnAnimationEnd(confetti, (durationSec + delaySec) * 1000 + 200);
        }

        // 3. 震动反馈 (如果设备支持)
        if (window.navigator.vibrate) {
          window.navigator.vibrate([100, 50, 100]);
        }
      }

      function openViewer(index) {
        const i = Math.max(0, Math.min(index, slides.length - 1));
        const s = slides[i];
        els.viewerImg.src = s.img;
        els.viewerImg.alt = s.title || "照片";
        els.viewerTitle.textContent = s.title || `第 ${i + 1} 张`;
        els.viewerText.textContent = s.text || "";
        els.viewer.classList.add("active");
        els.viewer.setAttribute("aria-hidden", "false");
      }

      function closeViewer() {
        els.viewer.classList.remove("active");
        els.viewer.setAttribute("aria-hidden", "true");
      }

      async function startParty() {
        clearCakePartyEffects();
        await showLoader("正在切换到生日派对...", 1200);
        setStep("cake");
        els.finalWords.textContent = CONFIG.finalWords;
        els.musicStatus.textContent = "正在为您切换音乐...";

        const switched = await crossfadeTo(CONFIG.cakeMusicSrc);
        if (switched) {
          els.musicStatus.textContent = "音乐：魔法的起点";
        } else {
          els.musicStatus.textContent = "音乐播放失败，请确认文件路径";
        }

        els.cake.classList.remove("reveal");
        void els.cake.offsetWidth;
        els.cake.classList.add("reveal");

        // 持续生成派对彩带
        initCakeConfetti();
        // 持续生成漂浮气球
        initCakeBalloons();
        renderWishMemory();
      }

      function initCakeConfetti() {
        const container = els.cakeConfettiContainer;
        if (!container) return;
        stopCakeConfettiInterval();
        container.innerHTML = "";
        const colors = ["#ff85a2", "#ffb3c6", "#ffd1df", "#ff3d93", "#ffffff", "#fff0f5", "#ffeb3b", "#4caf50", "#03a9f4"];

        for (let i = 0; i < 60; i++) {
          createOneConfetti(container, colors);
        }

        effectTimers.cakeConfetti = setInterval(() => {
          if (state.step !== "cake") {
            stopCakeConfettiInterval();
            return;
          }
          createOneConfetti(container, colors);
        }, 200);
      }

      function createOneConfetti(container, colors) {
        const confetti = document.createElement("div");
        confetti.className = "cake-confetti";
        confetti.style.setProperty("--c", colors[Math.floor(Math.random() * colors.length)]);
        confetti.style.setProperty("--x", `${randomBetween(-300, 300)}px`);
        const durationSec = randomBetween(3, 6);
        const delaySec = Math.random() * 2;
        confetti.style.setProperty("--d", `${durationSec}s`);
        confetti.style.left = `${Math.random() * 100}%`;
        confetti.style.animationDelay = `${delaySec}s`;

        if (Math.random() > 0.5) {
          confetti.style.borderRadius = "50%";
        }

        container.appendChild(confetti);
        // 动画为 infinite，用定时器在单周期结束后移除
        setTimeout(() => {
          if (confetti.parentNode === container) confetti.remove();
        }, (durationSec + delaySec) * 1000 + 300);
      }

      function initCakeBalloons() {
        const container = els.cakeConfettiContainer;
        if (!container) return;
        stopCakeBalloonInterval();
        const colors = ["#ff85a2", "#ffb3c6", "#74b9ff", "#55efc4", "#fab1a0", "#a29bfe", "#fdcb6e"];

        for (let i = 0; i < 8; i++) {
          createOneBalloon(container, colors);
        }

        effectTimers.cakeBalloons = setInterval(() => {
          if (state.step !== "cake") {
            stopCakeBalloonInterval();
            return;
          }
          createOneBalloon(container, colors);
        }, 3000);
      }

      function createOneBalloon(container, colors) {
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        balloon.style.setProperty("--c", colors[Math.floor(Math.random() * colors.length)]);
        balloon.style.setProperty("--w", `${randomBetween(40, 70)}px`);
        balloon.style.setProperty("--x", `${randomBetween(-50, 50)}px`);
        balloon.style.setProperty("--r", `${randomBetween(-15, 15)}deg`);
        const durationSec = randomBetween(8, 15);
        balloon.style.setProperty("--d", `${durationSec}s`);
        balloon.style.left = `${Math.random() * 90 + 5}%`;

        container.appendChild(balloon);
        setTimeout(() => {
          if (balloon.parentNode === container) balloon.remove();
        }, durationSec * 1000 + 500);
      }

      function blowOutCandles() {
        const flames = document.querySelectorAll(".flame");
        const candles = document.querySelectorAll(".candle");

        if (flames[0]?.classList.contains("extinguished")) return;

        flames.forEach((f) => f.classList.add("extinguished"));

        candles.forEach((c) => {
          for (let i = 0; i < 3; i++) {
            setTimeout(() => {
              const smoke = document.createElement("div");
              smoke.className = "smoke";
              c.appendChild(smoke);
              setTimeout(() => smoke.remove(), 2000);
            }, i * 150);
          }
        });

        setTimeout(() => {
          els.finalWish.classList.add("active");
          showToast("许个愿吧，小溪 ❤️");
          openWishOverlay();
        }, 600);
      }

      function initCandleInteraction() {
        els.cake.addEventListener("click", blowOutCandles);
      }

      function initWishUI() {
        els.wishSaveBtn.addEventListener("click", () => {
          const text = els.wishInput.value.trim();
          if (!text) {
            showToast("写几个字再放进愿望瓶吧～");
            return;
          }
          saveWish(text);
          renderWishMemory();
          closeWishOverlay();
          showToast("愿望已收好，会替你保管 ❤️");
        });

        els.wishSkipBtn.addEventListener("click", () => {
          closeWishOverlay();
          showToast("随时可以回来补写愿望哦");
        });

        els.wishOverlay.addEventListener("click", (e) => {
          if (e.target === els.wishOverlay) closeWishOverlay();
        });
      }

      function initLetterUI() {
        els.letterContinueBtn.addEventListener("click", () => {
          if (state.letterTyping || els.letterContinueBtn.disabled) return;
          enterSlidesFromUnlock();
        });
      }

      async function restart() {
        musicFadeId++;
        state.index = 0;
        state.summaryStacked = false;
        closeWishOverlay();

        document.querySelectorAll(".flame").forEach((f) => f.classList.remove("extinguished"));
        els.finalWish.classList.remove("active");

        setStep("slides");
        renderSlide();
        await crossfadeTo(CONFIG.musicSrc);
      }

      async function next() {
        if (slides.length === 0 || state.slideLoading) return;
        if (state.index >= slides.length - 1) {
          setStep("summary");
          runDeskStackOnce();
          return;
        }
        state.index += 1;
        await renderSlide();
      }

      els.nextBtn.addEventListener("click", () => next());
      els.partyBtn.addEventListener("click", startParty);
      els.backToStartBtn.addEventListener("click", restart);
      els.backToStartBtn2.addEventListener("click", restart);
      els.backToMemoriesBtn.addEventListener("click", () => {
        setStep("summary");
        runDeskStackOnce();
      });

      els.viewerBackdrop.addEventListener("click", closeViewer);
      els.viewerCloseBtn.addEventListener("click", closeViewer);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (els.wishOverlay.classList.contains("active")) {
            closeWishOverlay();
            return;
          }
          closeViewer();
        }
      });

      els.mainImg.addEventListener("error", () => {
        if (state.slideLoading) return;
        showToast("这张照片路径没找到：请把文件放到 assets/photos/ 或修改 CONFIG");
      });

      function initBackgroundEffects(container) {
        if (!container) return;
        container.innerHTML = '';
        
        // Heavy Falling Hearts
        const heartIcons = ['❤️', '💖', '💗', '💓', '�', '�'];
        for (let i = 0; i < 28; i++) {
          const heart = document.createElement('div');
          heart.className = 'falling-heart-heavy';
          heart.textContent = heartIcons[Math.floor(Math.random() * heartIcons.length)];
          heart.style.left = `${Math.random() * 100}%`;
          heart.style.setProperty('--d', `${Math.random() * 5 + 3}s`);
          heart.style.setProperty('--s', `${Math.random() * 20 + 15}px`);
          heart.style.animationDelay = `${Math.random() * 10}s`;
          container.appendChild(heart);
        }

        // Shooting Stars
        for (let i = 0; i < 10; i++) {
          const sStar = document.createElement('div');
          sStar.className = 'shooting-star';
          sStar.style.setProperty('--x', `${Math.random() * 120}%`);
          sStar.style.setProperty('--d', `${Math.random() * 4 + 3}s`);
          sStar.style.animationDelay = `${Math.random() * 10}s`;
          container.appendChild(sStar);
        }

        // Stars
        for (let i = 0; i < 50; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          const size = Math.random() * 3 + 1;
          star.style.width = `${size}px`;
          star.style.height = `${size}px`;
          star.style.left = `${Math.random() * 100}%`;
          star.style.top = `${Math.random() * 100}%`;
          star.style.setProperty('--d', `${Math.random() * 3 + 2}s`);
          container.appendChild(star);
        }

        // Floating Decor
        const decors = ['✨', '🌸', '🎀', '⭐', '🌙', '☁️'];
        for (let i = 0; i < 20; i++) {
          const decor = document.createElement('div');
          decor.className = 'floating-decor';
          decor.textContent = decors[Math.floor(Math.random() * decors.length)];
          decor.style.left = `${Math.random() * 100}%`;
          decor.style.top = `${Math.random() * 100}%`;
          decor.style.fontSize = `${Math.random() * 20 + 16}px`;
          decor.style.opacity = Math.random() * 0.3 + 0.2;
          decor.style.setProperty('--d', `${Math.random() * 6 + 4}s`);
          decor.style.animationDelay = `${Math.random() * 5}s`;
          container.appendChild(decor);
        }
      }

      (function init() {
        initLock();
        initMusicControl();
        initCandleInteraction();
        initWishUI();
        initLetterUI();
        els.finalWords.textContent = CONFIG.finalWords;
        try {
          localStorage.removeItem("hb_progress_v1");
        } catch {}
        setStep("lock");
        if (slides.length > 0) {
          prefetchSlideImage(0);
          prefetchSlideImage(1);
        }
      })();
    </script>
  </body>
</html>
